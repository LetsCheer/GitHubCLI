<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub CLI — Cheat Sheet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-void: #060810;
            --bg-deep: #0b0f1a;
            --bg-surface: #0f1422;
            --bg-card: #141929;
            --bg-hover: #1a2035;
            --glass-bg: rgba(15, 20, 34, 0.7);
            --glass-border: rgba(99, 140, 255, 0.12);
            --glass-shine: rgba(255, 255, 255, 0.04);
            --accent-primary: #4f8bff;
            --accent-secondary: #7c5cff;
            --accent-cyan: #00d4ff;
            --accent-green: #00e5a0;
            --accent-orange: #ff8c42;
            --accent-red: #ff4d6d;
            --accent-yellow: #ffd166;
            --text-primary: #e8edf8;
            --text-secondary: #8a95b0;
            --text-muted: #4a5270;
            --text-code: #a8d8ff;
            --sidebar-width: 270px;
            --topbar-height: 60px;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --shadow-glow: 0 0 30px rgba(79, 139, 255, 0.15);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
            --font-mono: 'JetBrains Mono', monospace;
            --font-display: 'Syne', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-display);
            background: var(--bg-void);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── NOISE TEXTURE ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ── TOP BAR ── */
        .topbar {
            height: var(--topbar-height);
            background: rgba(6, 8, 16, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            position: relative;
            z-index: 100;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -1px;
        }

        .logo-text {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .logo-badge {
            font-family: var(--font-mono);
            font-size: 10px;
            background: rgba(79, 139, 255, 0.15);
            border: 1px solid rgba(79, 139, 255, 0.3);
            color: var(--accent-primary);
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 0.05em;
        }

        /* ── COMMAND PALETTE ── */
        .palette-wrap {
            flex: 1;
            max-width: 520px;
            position: relative;
        }

        .palette-input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .palette-icon {
            position: absolute;
            left: 12px;
            color: var(--text-muted);
            font-size: 13px;
            pointer-events: none;
        }

        .palette-kbd {
            position: absolute;
            right: 10px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            pointer-events: none;
        }

        .palette-input {
            width: 100%;
            height: 36px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 0 80px 0 36px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .palette-input:focus {
            background: rgba(79, 139, 255, 0.06);
            border-color: rgba(79, 139, 255, 0.4);
            box-shadow: 0 0 0 3px rgba(79, 139, 255, 0.08);
        }

        .palette-input::placeholder {
            color: var(--text-muted);
        }

        .palette-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: rgba(11, 15, 26, 0.97);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-card), var(--shadow-glow);
            max-height: 340px;
            overflow-y: auto;
            z-index: 999;
            display: none;
        }

        .palette-dropdown.open {
            display: block;
        }

        .palette-result {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 14px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background 0.15s;
        }

        .palette-result:hover,
        .palette-result.active {
            background: rgba(79, 139, 255, 0.1);
        }

        .palette-result:last-child {
            border-bottom: none;
        }

        .palette-result-cmd {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--accent-cyan);
            flex-shrink: 0;
            min-width: 170px;
        }

        .palette-result-desc {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .palette-result-cat {
            font-size: 10px;
            color: var(--text-muted);
            margin-left: auto;
            flex-shrink: 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .palette-empty {
            padding: 20px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        .mobile-menu-btn {
            display: none;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            flex-shrink: 0;
        }

        .mobile-menu-btn span {
            display: block;
            width: 18px;
            height: 1.5px;
            background: var(--text-secondary);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            flex-shrink: 0;
        }

        .topbar-link {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 4px 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-sm);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .topbar-link:hover {
            color: var(--accent-primary);
            border-color: rgba(79, 139, 255, 0.3);
            background: rgba(79, 139, 255, 0.06);
        }

        /* ── MAIN LAYOUT ── */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-width);
            flex-shrink: 0;
            background: rgba(9, 12, 22, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-search-wrap {
            padding: 12px;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .sidebar-search {
            width: 100%;
            height: 34px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 12px;
            padding: 0 10px 0 30px;
            outline: none;
            transition: border-color 0.2s;
        }

        .sidebar-search:focus {
            border-color: rgba(79, 139, 255, 0.35);
            background: rgba(79, 139, 255, 0.05);
        }

        .sidebar-search::placeholder {
            color: var(--text-muted);
        }

        .sidebar-search-icon {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 11px;
            pointer-events: none;
        }

        .sidebar-search-wrap {
            position: relative;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(79, 139, 255, 0.2) transparent;
        }

        .sidebar-nav::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-nav::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-nav::-webkit-scrollbar-thumb {
            background: rgba(79, 139, 255, 0.2);
            border-radius: 2px;
        }

        .nav-category {
            margin-bottom: 2px;
        }

        .nav-cat-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 14px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
            border-radius: 0;
        }

        .nav-cat-header:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .nav-cat-icon {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            flex-shrink: 0;
        }

        .nav-cat-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            flex: 1;
        }

        .nav-cat-arrow {
            font-size: 10px;
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .nav-cat-header.collapsed .nav-cat-arrow {
            transform: rotate(-90deg);
        }

        .nav-cat-items {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .nav-cat-items.collapsed {
            max-height: 0 !important;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 14px 5px 38px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 11.5px;
            color: var(--text-muted);
            border-left: 2px solid transparent;
            transition: all 0.15s;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-item:hover {
            color: var(--text-secondary);
            background: rgba(79, 139, 255, 0.05);
            border-left-color: rgba(79, 139, 255, 0.3);
        }

        .nav-item.active {
            color: var(--accent-primary);
            background: rgba(79, 139, 255, 0.08);
            border-left-color: var(--accent-primary);
        }

        .nav-item-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.5;
            flex-shrink: 0;
        }

        .nav-item.hidden {
            display: none;
        }

        .nav-category.hidden {
            display: none;
        }

        /* ── CONTENT ── */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 32px 40px 80px;
            scrollbar-width: thin;
            scrollbar-color: rgba(79, 139, 255, 0.2) transparent;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(79, 139, 255, 0.2);
            border-radius: 3px;
        }

        /* ── HERO ── */
        .hero {
            text-align: center;
            padding: 48px 20px 56px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(79, 139, 255, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-eyebrow {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--accent-primary);
            text-transform: uppercase;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .hero-eyebrow::before,
        .hero-eyebrow::after {
            content: '';
            display: block;
            width: 40px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--accent-primary));
        }

        .hero-eyebrow::after {
            background: linear-gradient(to left, transparent, var(--accent-primary));
        }

        .hero-title {
            font-size: clamp(32px, 5vw, 52px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 30%, var(--accent-primary) 70%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .hero-sub {
            font-size: 15px;
            color: var(--text-secondary);
            max-width: 480px;
            margin: 0 auto 28px;
            line-height: 1.6;
        }

        .hero-stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-stat {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 10px 20px;
            backdrop-filter: blur(12px);
        }

        .hero-stat-num {
            font-family: var(--font-mono);
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .hero-stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 2px;
        }

        /* ── SECTION ── */
        .cmd-section {
            margin-bottom: 16px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0 10px;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 12px;
            cursor: pointer;
            user-select: none;
        }

        .section-header:hover .section-title {
            color: var(--accent-primary);
        }

        .section-icon {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            font-family: var(--font-mono);
            font-weight: 700;
            letter-spacing: -1px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.01em;
            transition: color 0.2s;
        }

        .section-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-left: auto;
            font-family: var(--font-mono);
        }

        .section-toggle {
            color: var(--text-muted);
            font-size: 12px;
            margin-left: 4px;
            transition: transform 0.3s;
        }

        .section-header.collapsed .section-toggle {
            transform: rotate(-90deg);
        }

        .section-body {
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .section-body.collapsed {
            max-height: 0 !important;
        }

        /* ── COMMAND CARD ── */
        .cmd-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            margin-bottom: 10px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .cmd-card:hover {
            border-color: rgba(79, 139, 255, 0.25);
            box-shadow: var(--shadow-card);
        }

        .cmd-card-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px 12px;
            cursor: pointer;
        }

        .cmd-badge {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .cmd-name {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-code);
            word-break: break-all;
        }

        .cmd-short-desc {
            font-size: 12.5px;
            color: var(--text-secondary);
            margin-top: 3px;
            line-height: 1.4;
        }

        .cmd-card-body {
            padding: 0 16px 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .cmd-section-label {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 10px 0 6px;
        }

        .cmd-syntax {
            font-family: var(--font-mono);
            font-size: 12.5px;
            color: var(--accent-green);
            background: rgba(0, 229, 160, 0.04);
            border: 1px solid rgba(0, 229, 160, 0.12);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            overflow-x: auto;
            white-space: pre;
        }

        .cmd-flags {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 2px;
        }

        .cmd-flag {
            display: flex;
            align-items: baseline;
            gap: 8px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.02);
            font-size: 12px;
        }

        .cmd-flag-name {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--accent-yellow);
            flex-shrink: 0;
            min-width: 140px;
        }

        .cmd-flag-desc {
            color: var(--text-secondary);
        }

        /* ── EXAMPLES ── */
        .examples-block {
            margin-top: 6px;
        }

        .example-item {
            position: relative;
            margin-bottom: 8px;
        }

        .example-comment {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 3px;
            padding-left: 4px;
        }

        .example-code-wrap {
            position: relative;
            display: flex;
            align-items: stretch;
        }

        .example-code {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 12px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-sm);
            padding: 8px 12px 8px 36px;
            color: var(--text-primary);
            overflow-x: auto;
            white-space: pre;
            line-height: 1.5;
            position: relative;
        }

        .example-code::before {
            content: '$';
            position: absolute;
            left: 12px;
            top: 8px;
            color: var(--accent-primary);
            font-weight: 600;
            pointer-events: none;
        }

        .copy-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 26px;
            height: 26px;
            background: rgba(79, 139, 255, 0.1);
            border: 1px solid rgba(79, 139, 255, 0.2);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
            font-size: 10px;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
        }

        .example-code-wrap:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            background: rgba(79, 139, 255, 0.25);
        }

        .copy-btn.copied {
            background: rgba(0, 229, 160, 0.2);
            border-color: rgba(0, 229, 160, 0.4);
            color: var(--accent-green);
        }

        /* ── COLOR THEMES PER CATEGORY ── */
        .cat-auth .section-icon {
            background: rgba(79, 139, 255, 0.15);
            color: var(--accent-primary);
        }

        .cat-auth .cmd-badge {
            background: rgba(79, 139, 255, 0.12);
            color: var(--accent-primary);
            border: 1px solid rgba(79, 139, 255, 0.2);
        }

        .cat-repo .section-icon {
            background: rgba(124, 92, 255, 0.15);
            color: var(--accent-secondary);
        }

        .cat-repo .cmd-badge {
            background: rgba(124, 92, 255, 0.12);
            color: var(--accent-secondary);
            border: 1px solid rgba(124, 92, 255, 0.2);
        }

        .cat-pr .section-icon {
            background: rgba(0, 212, 255, 0.12);
            color: var(--accent-cyan);
        }

        // ══════════════════════════════════════════════════════════════
        // BUILD
        // ══════════════════════════════════════════════════════════════
        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Flat command index for search
        const COMMAND_INDEX = [];
        CATEGORIES.forEach(cat => {
            cat.commands.forEach(cmd => {
                COMMAND_INDEX.push({ id: cmd.id, name: cmd.name, desc: cmd.desc, cat: cat.label });
            });
        });

        // Count stats
        document.getElementById('statCmds').textContent = COMMAND_INDEX.length;
        let totalExamples = 0;
        CATEGORIES.forEach(cat => cat.commands.forEach(cmd => totalExamples += cmd.examples.length));
        document.getElementById('statExamples').textContent = totalExamples;

        // ── BUILD SIDEBAR ──
        function buildSidebar() {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = '';
            CATEGORIES.forEach(cat => {
                const catDiv = document.createElement('div');
                catDiv.className = `nav-category ${cat.cls}`;
                catDiv.dataset.cat = cat.id;

                const header = document.createElement('div');
                header.className = 'nav-cat-header';
                header.innerHTML = `
      <div class="nav-cat-icon">${cat.icon}</div>
      <span class="nav-cat-label">${cat.label}</span>
      <span class="nav-cat-arrow">▾</span>
    `;
                header.addEventListener('click', () => toggleCategory(catDiv, header));

                const items = document.createElement('div');
                items.className = 'nav-cat-items';
                items.style.maxHeight = '2000px';

                cat.commands.forEach(cmd => {
                    const item = document.createElement('a');
                    item.className = 'nav-item';
                    item.dataset.id = cmd.id;
                    item.dataset.name = cmd.name.toLowerCase();
                    const shortName = cmd.name.replace('gh ', '');
                    item.innerHTML = `<span class="nav-item-dot"></span>${escapeHtml(shortName)}`;
                    item.addEventListener('click', (e) => {
                        e.preventDefault();
                        scrollToCmd(cmd.id);
                        closeMobileSidebar();
                    });
                    items.appendChild(item);
                });

                catDiv.appendChild(header);
                catDiv.appendChild(items);
                nav.appendChild(catDiv);
            });
        }

        function toggleCategory(catDiv, header) {
            const items = catDiv.querySelector('.nav-cat-items');
            const isCollapsed = items.classList.contains('collapsed');
            if (isCollapsed) {
                items.style.maxHeight = items.scrollHeight + 'px';
                items.classList.remove('collapsed');
                header.classList.remove('collapsed');
            } else {
                items.style.maxHeight = '0';
                items.classList.add('collapsed');
                header.classList.add('collapsed');
            }
        }

        // ── BUILD CONTENT ──
        function buildContent() {
            const container = document.getElementById('commandContent');
            container.innerHTML = '';

            CATEGORIES.forEach(cat => {
                const section = document.createElement('section');
                section.className = `cmd-section ${cat.cls}`;
                section.id = `cat-${cat.id}`;

                const header = document.createElement('div');
                header.className = 'section-header';
                header.innerHTML = `
      <div class="section-icon">${cat.icon}</div>
      <span class="section-title">gh ${cat.label}</span>
      <span class="section-desc" style="display:none">${cat.commands.length} cmds</span>
      <span class="section-toggle">▾</span>
    `;
                header.addEventListener('click', () => {
                    const body = section.querySelector('.section-body');
                    const isC = body.classList.contains('collapsed');
                    if (isC) {
                        body.style.maxHeight = body.scrollHeight + 'px';
                        body.classList.remove('collapsed');
                        header.classList.remove('collapsed');
                    } else {
                        body.style.maxHeight = '0';
                        body.classList.add('collapsed');
                        header.classList.add('collapsed');
                    }
                });

                const body = document.createElement('div');
                body.className = 'section-body';
                body.style.maxHeight = '100000px';

                cat.commands.forEach(cmd => {
                    body.appendChild(buildCmdCard(cmd));
                });

                section.appendChild(header);
                section.appendChild(body);
                container.appendChild(section);

                // Divider between sections
                const divider = document.createElement('div');
                divider.className = 'divider';
                container.appendChild(divider);
            });
        }

        function buildCmdCard(cmd) {
            const card = document.createElement('div');
            card.className = 'cmd-card';
            card.id = cmd.id;

            let flagsHtml = '';
            if (cmd.flags && cmd.flags.length > 0) {
                flagsHtml = `<div class="cmd-section-label">Flags</div>
    <div class="cmd-flags">
      ${cmd.flags.map(f => `
        <div class="cmd-flag">
          <span class="cmd-flag-name">${escapeHtml(f.name)}</span>
          <span class="cmd-flag-desc">${escapeHtml(f.desc)}</span>
        </div>`).join('')}
    </div>`;
            }

            let examplesHtml = '';
            if (cmd.examples && cmd.examples.length > 0) {
                examplesHtml = `<div class="cmd-section-label">Examples</div>
    <div class="examples-block">
      ${cmd.examples.map(ex => `
        <div class="example-item">
          <div class="example-comment">${escapeHtml(ex.comment)}</div>
          <div class="example-code-wrap">
            <div class="example-code">${escapeHtml(ex.code)}</div>
            <button class="copy-btn" onclick="copyCode(this, ${JSON.stringify(ex.code)})" title="Copy">⧉</button>
          </div>
        </div>`).join('')}
    </div>`;
            }

            card.innerHTML = `
    <div class="cmd-card-header">
      <span class="cmd-badge">cmd</span>
      <div>
        <div class="cmd-name">${escapeHtml(cmd.name)}</div>
        <div class="cmd-short-desc">${escapeHtml(cmd.desc)}</div>
      </div>
    </div>
    <div class="cmd-card-body">
      <div class="cmd-section-label">Syntax</div>
      <div class="cmd-syntax">${escapeHtml(cmd.syntax)}</div>
      ${flagsHtml}
      ${examplesHtml}
    </div>
  `;
            return card;
        }

        // ── COPY ──
        function copyCode(btn, code) {
            navigator.clipboard.writeText(code).then(() => {
                btn.classList.add('copied');
                btn.textContent = '✓';
                setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '⧉'; }, 1500);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = code;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.classList.add('copied');
                btn.textContent = '✓';
                setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '⧉'; }, 1500);
            });
        }

        // ── SCROLL ──
        function scrollToCmd(id) {
            const el = document.getElementById(id);
            if (!el) return;
            // Make sure parent section is open
            const sectionBody = el.closest('.section-body');
            if (sectionBody && sectionBody.classList.contains('collapsed')) {
                const header = sectionBody.previousElementSibling;
                sectionBody.style.maxHeight = sectionBody.scrollHeight + 'px';
                sectionBody.classList.remove('collapsed');
                if (header) header.classList.remove('collapsed');
            }
            const content = document.getElementById('mainContent');
            const top = el.getBoundingClientRect().top + content.scrollTop - 20;
            content.scrollTo({ top, behavior: 'smooth' });
            el.classList.add('highlight');
            setTimeout(() => el.classList.remove('highlight'), 2000);
            // Update active nav item
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const navItem = document.querySelector(`.nav-item[data-id="${id}"]`);
            if (navItem) {
                navItem.classList.add('active');
                navItem.scrollIntoView({ block: 'nearest' });
            }
        }

        // ── SIDEBAR FILTER ──
        let filterDebounce;
        document.getElementById('sidebarSearch').addEventListener('input', function () {
            clearTimeout(filterDebounce);
            filterDebounce = setTimeout(() => filterSidebar(this.value.toLowerCase()), 60);
        });

        function filterSidebar(q) {
            document.querySelectorAll('.nav-category').forEach(catEl => {
                const catId = catEl.dataset.cat;
                const cat = CATEGORIES.find(c => c.id === catId);
                let anyVisible = false;
                catEl.querySelectorAll('.nav-item').forEach(item => {
                    const name = item.dataset.name || '';
                    const match = !q || name.includes(q);
                    item.classList.toggle('hidden', !match);
                    if (match) anyVisible = true;
                });
                catEl.classList.toggle('hidden', !anyVisible);
                if (q && anyVisible) {
                    const items = catEl.querySelector('.nav-cat-items');
                    const header = catEl.querySelector('.nav-cat-header');
                    if (items && items.classList.contains('collapsed')) {
                        items.style.maxHeight = '2000px';
                        items.classList.remove('collapsed');
                        header && header.classList.remove('collapsed');
                    }
                }
            });
        }

        // ── COMMAND PALETTE ──
        const paletteInput = document.getElementById('paletteInput');
        const paletteDropdown = document.getElementById('paletteDropdown');
        let palSelection = -1;
        let palResults = [];

        paletteInput.addEventListener('input', function () {
            const q = this.value.toLowerCase().trim();
            if (!q) { paletteDropdown.classList.remove('open'); return; }
            palResults = COMMAND_INDEX.filter(c =>
                c.name.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q) || c.cat.includes(q)
            ).slice(0, 12);
            palSelection = -1;
            renderPalette();
        });

        paletteInput.addEventListener('keydown', function (e) {
            if (!paletteDropdown.classList.contains('open')) return;
            if (e.key === 'ArrowDown') { e.preventDefault(); palSelection = Math.min(palSelection + 1, palResults.length - 1); renderPalette(); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); palSelection = Math.max(palSelection - 1, -1); renderPalette(); }
            else if (e.key === 'Enter') {
                e.preventDefault();
                const item = palSelection >= 0 ? palResults[palSelection] : palResults[0];
                if (item) { scrollToCmd(item.id); paletteDropdown.classList.remove('open'); paletteInput.value = ''; }
            }
            else if (e.key === 'Escape') { paletteDropdown.classList.remove('open'); paletteInput.value = ''; }
        });

        function renderPalette() {
            if (!palResults.length) {
                paletteDropdown.innerHTML = '<div class="palette-empty">No results found</div>';
                paletteDropdown.classList.add('open');
                return;
            }
            paletteDropdown.innerHTML = palResults.map((r, i) => `
    <div class="palette-result${i === palSelection ? ' active' : ''}" data-idx="${i}">
      <span class="palette-result-cmd">${escapeHtml(r.name)}</span>
      <span class="palette-result-desc">${escapeHtml(r.desc)}</span>
      <span class="palette-result-cat">${escapeHtml(r.cat)}</span>
    </div>`).join('');
            paletteDropdown.classList.add('open');
            paletteDropdown.querySelectorAll('.palette-result').forEach(el => {
                el.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    const idx = parseInt(el.dataset.idx);
                    const item = palResults[idx];
                    if (item) { scrollToCmd(item.id); paletteDropdown.classList.remove('open'); paletteInput.value = ''; }
                });
            });
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.palette-wrap')) paletteDropdown.classList.remove('open');
        });

        // ── KEYBOARD SHORTCUT ──
        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                paletteInput.focus();
                paletteInput.select();
            }
        });

        // ── MOBILE SIDEBAR ──
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const menuBtn = document.getElementById('mobileMenuBtn');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('visible');
        });

        overlay.addEventListener('click', closeMobileSidebar);

        function closeMobileSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('visible');
        }

        // ── SCROLL TO TOP ──
        const scrollTopBtn = document.getElementById('scrollTop');
        document.getElementById('mainContent').addEventListener('scroll', function () {
            scrollTopBtn.classList.toggle('visible', this.scrollTop > 300);
        });

        scrollTopBtn.addEventListener('click', () => {
            document.getElementById('mainContent').scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ── SCROLL SPY ──
        let spyDebounce;
        document.getElementById('mainContent').addEventListener('scroll', function () {
            clearTimeout(spyDebounce);
            spyDebounce = setTimeout(() => {
                const content = this;
                const scrollTop = content.scrollTop;
                let active = null;
                document.querySelectorAll('.cmd-card').forEach(card => {
                    const top = card.offsetTop;
                    if (top <= scrollTop + 120) active = card.id;
                });
                if (active) {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    const navItem = document.querySelector(`.nav-item[data-id="${active}"]`);
                    if (navItem) {
                        navItem.classList.add('active');
                    }
                }
            }, 80);
        });

        // ── INIT ──
        buildSidebar();
        buildContent();
    </script>
</body>

</html>
