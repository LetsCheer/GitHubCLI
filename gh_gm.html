<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub CLI Cheat Sheet | Ultimate Guide</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: rgba(22, 27, 34, 0.8);
            --card-bg: rgba(48, 54, 61, 0.2);
            --accent: #238636;
            --accent-hover: #2ea043;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            line-height: 1.6;
        }

        /* --- Sidebar Layout --- */
        #sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .filter-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: white;
            outline: none;
        }

        #nav-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .nav-group {
            margin-bottom: 10px;
        }

        .nav-category {
            padding: 8px 20px;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-item {
            padding: 8px 25px;
            cursor: pointer;
            font-size: 0.9rem;
            display: block;
            color: var(--text-main);
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-hover);
        }

        /* --- Main Content area --- */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- Command Palette / Search bar --- */
        .top-search-wrapper {
            padding: 15px 40px;
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .global-search-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        #global-search {
            width: 100%;
            padding: 12px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #161b22;
            border: 1px solid var(--border);
            border-radius: 0 0 8px 8px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .search-result-item {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }

        .search-result-item:hover {
            background: var(--card-bg);
        }

        /* --- Content Container --- */
        #content-area {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            scroll-behavior: smooth;
        }

        .container-limit {
            max-width: 900px;
            margin: 0 auto;
        }

        section {
            margin-bottom: 80px;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        h3 {
            font-size: 1.5rem;
            margin: 30px 0 15px;
            color: var(--accent-hover);
        }

        .command-block {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            transition: transform 0.2s;
        }

        .command-block:hover {
            border-color: var(--accent);
        }

        .syntax {
            background: #000;
            padding: 15px;
            border-radius: 6px;
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 0.9rem;
            color: #79c0ff;
            margin: 15px 0;
            position: relative;
        }

        .example-box {
            background: rgba(0, 0, 0, 0.2);
            border-left: 4px solid var(--accent);
            padding: 15px;
            margin-top: 20px;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            opacity: 0.7;
        }

        .copy-btn:hover {
            opacity: 1;
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                height: auto;
                max-height: 200px;
            }

            #content-area {
                padding: 20px;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <h1><span>GitHub</span> CLI</h1>
            <input type="text" id="sidebar-filter" class="filter-input" placeholder="Filter commands...">
        </div>
        <nav id="nav-tree">
        </nav>
    </aside>

    <main id="main-content">
        <div class="top-search-wrapper">
            <div class="global-search-container">
                <input type="text" id="global-search" placeholder="Search documentation (Cmd + K)">
                <div id="search-results" class="search-results"></div>
            </div>
        </div>

        <div id="content-area">
            <div class="container-limit" id="content-injector">
            </div>
        </div>
    </main>

    <script>
        // 1. Data Object (Consolidated Manual & Examples)
        const ghData = [
            {
                category: "Core Commands",
                items: [
                    { id: "auth", title: "gh auth", desc: "Authenticate with GitHub.", syntax: "gh auth <command>", example: "gh auth login", exampleDesc: "Interactive login to GitHub account." },
                    { id: "browse", title: "gh browse", desc: "Open the repository in the browser.", syntax: "gh browse [<number> | <path>]", example: "gh browse 21", exampleDesc: "Open issue or PR #21 in browser." },
                    { id: "config", title: "gh config", desc: "Manage configuration for gh.", syntax: "gh config <command>", example: "gh config set editor vim", exampleDesc: "Set your preferred text editor." },
                    { id: "repo", title: "gh repo", desc: "Create, clone, fork, and view repositories.", syntax: "gh repo <command>", example: "gh repo create my-project --public", exampleDesc: "Create a new public repository." }
                ]
            },
            {
                category: "GitHub Actions",
                items: [
                    { id: "run", title: "gh run", desc: "View, document, and control workflow runs.", syntax: "gh run <command>", example: "gh run list --workflow main.yml", exampleDesc: "List recent runs for a specific workflow." },
                    { id: "workflow", title: "gh workflow", desc: "View and manage GitHub Actions workflows.", syntax: "gh workflow <command>", example: "gh workflow view", exampleDesc: "See details of the primary workflow." }
                ]
            },
            {
                category: "Additional Commands",
                items: [
                    { id: "issue", title: "gh issue", desc: "Manage issues.", syntax: "gh issue <command>", example: "gh issue list --label 'bug'", exampleDesc: "List all issues tagged with 'bug'." },
                    { id: "pr", title: "gh pr", desc: "Manage pull requests.", syntax: "gh pr <command>", example: "gh pr checkout 123", exampleDesc: "Check out the code for PR #123 locally." },
                    { id: "release", title: "gh release", desc: "Manage GitHub releases.", syntax: "gh release <command>", example: "gh release create v1.0.0 ./dist/app.zip", exampleDesc: "Create a release and upload an asset." },
                    { id: "gist", title: "gh gist", desc: "Manage gists.", syntax: "gh gist <command>", example: "gh gist create script.py", exampleDesc: "Create a new gist from a file." }
                ]
            },
            {
                category: "General",
                items: [
                    { id: "options", title: "Global Options", desc: "Flags available on every command.", syntax: "--help, --version", example: "gh repo list --help", exampleDesc: "Get help for a specific command." }
                ]
            }
        ];

        const navTree = document.getElementById('nav-tree');
        const contentInjector = document.getElementById('content-injector');
        const sidebarFilter = document.getElementById('sidebar-filter');
        const globalSearch = document.getElementById('global-search');
        const searchResults = document.getElementById('search-results');

        // 2. Initialize Page Content
        function init() {
            let contentHtml = '';
            let navHtml = '';

            ghData.forEach(group => {
                navHtml += `<div class="nav-group"><div class="nav-category">${group.category}</div>`;
                contentHtml += `<section id="sec-${group.category.replace(/\s+/g, '-')}"><h2>${group.category}</h2>`;

                group.items.forEach(item => {
                    navHtml += `<a href="#${item.id}" class="nav-item" data-title="${item.title}">${item.title}</a>`;

                    contentHtml += `
                    <div class="command-block" id="${item.id}">
                        <h3>${item.title}</h3>
                        <p>${item.desc}</p>
                        <div class="syntax">
                            <button class="copy-btn" onclick="copyText('${item.syntax}')">Copy</button>
                            <code>$ ${item.syntax}</code>
                        </div>
                        <div class="example-box">
                            <strong>Example:</strong> ${item.exampleDesc}
                            <div class="syntax">
                                <button class="copy-btn" onclick="copyText('${item.example}')">Copy</button>
                                <code>$ ${item.example}</code>
                            </div>
                        </div>
                    </div>
                `;
                });
                navHtml += `</div>`;
                contentHtml += `</section>`;
            });

            navTree.innerHTML = navHtml;
            contentInjector.innerHTML = contentHtml;
        }

        // 3. Sidebar Filtering
        sidebarFilter.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('.nav-item').forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(val) ? 'block' : 'none';
            });
        });

        // 4. Global Command Palette Search
        globalSearch.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if (!val) { searchResults.style.display = 'none'; return; }

            let matches = [];
            ghData.forEach(g => {
                g.items.forEach(i => {
                    if (i.title.toLowerCase().includes(val) || i.desc.toLowerCase().includes(val)) {
                        matches.push(i);
                    }
                });
            });

            if (matches.length > 0) {
                searchResults.innerHTML = matches.map(m => `
                <div class="search-result-item" onclick="scrollToId('${m.id}')">
                    <strong>${m.title}</strong><br>
                    <small style="color: var(--text-muted)">${m.desc}</small>
                </div>
            `).join('');
                searchResults.style.display = 'block';
            } else {
                searchResults.style.display = 'none';
            }
        });

        // 5. Utility Functions
        function scrollToId(id) {
            const el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth' });
                searchResults.style.display = 'none';
                globalSearch.value = '';
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert('Copied to clipboard!');
        }

        // Smooth scroll for nav items
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('nav-item')) {
                e.preventDefault();
                const id = e.target.getAttribute('href').substring(1);
                scrollToId(id);
            }
        });

        // Keyboard Shortcut (Cmd/Ctrl + K)
        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                globalSearch.focus();
            }
        });

        init();
    </script>
</body>

</html>
