<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gh CLI | Ultimate Cheat Sheet</title>
    <style>
        :root {
            --bg: #0d1117;
            --sidebar-bg: rgba(22, 27, 34, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.3);
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --code-bg: #161b22;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- Sidebar --- */
        #sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-header h1 {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-wrapper {
            position: relative;
        }

        .sidebar-filter {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            outline: none;
        }

        .sidebar-filter:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .nav-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .nav-group {
            margin-bottom: 20px;
        }

        .nav-group-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 8px;
            padding-left: 10px;
        }

        .nav-item {
            display: block;
            padding: 8px 12px;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent);
        }

        .nav-item.active {
            background: var(--accent-glow);
            color: var(--accent);
            font-weight: 600;
        }

        /* --- Main Content --- */
        #main-content {
            flex: 1;
            height: 100vh;
            overflow-y: scroll;
            scroll-behavior: smooth;
            position: relative;
        }

        .top-bar {
            position: sticky;
            top: 0;
            z-index: 90;
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            border-bottom: 1px solid var(--glass-border);
        }

        .command-palette {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        #global-search {
            width: 100%;
            background: var(--code-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 12px 25px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #search-results {
            position: absolute;
            top: 110%;
            left: 0;
            right: 0;
            background: #1c2128;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .search-result-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--glass-border);
        }

        .search-result-item:hover {
            background: var(--accent-glow);
        }

        .content-body {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        section {
            margin-bottom: 80px;
            scroll-margin-top: 100px;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cmd-desc {
            color: var(--text-dim);
            margin-bottom: 25px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .command-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .syntax {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            color: #7ee787;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-left: 4px solid var(--accent);
        }

        .example-block {
            background: var(--code-bg);
            border-radius: 8px;
            position: relative;
            margin-top: 15px;
        }

        .example-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.75rem;
            color: var(--text-dim);
            border-radius: 8px 8px 0 0;
        }

        pre {
            padding: 20px;
            overflow-x: auto;
            color: #e6edf3;
            font-size: 0.9rem;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--accent);
            color: #000;
        }

        /* --- Mobile --- */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                height: auto;
                position: fixed;
                bottom: 0;
                transform: translateY(100%);
            }

            #sidebar.open {
                transform: translateY(0);
            }

            .content-body {
                padding: 20px;
            }

            .top-bar {
                padding: 10px;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }
    </style>
</head>

<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <h1><span>🚀</span> gh manual</h1>
            <div class="filter-wrapper">
                <input type="text" class="sidebar-filter" id="sidebar-filter" placeholder="Filter commands...">
            </div>
        </div>
        <nav class="nav-list" id="nav-list">
        </nav>
    </aside>

    <main id="main-content">
        <header class="top-bar">
            <div class="command-palette">
                <input type="text" id="global-search" placeholder="Type a command (e.g. 'repo create')...">
                <div id="search-results"></div>
            </div>
        </header>

        <div class="content-body" id="content-body">
        </div>
    </main>

    <script>
        const cliData = [
            {
                category: "Core & Setup",
                commands: [
                    {
                        id: "gh-auth",
                        name: "gh auth",
                        desc: "Authenticate with GitHub and manage credentials.",
                        syntax: "gh auth <command> [flags]",
                        examples: [
                            { label: "Login interactively", code: "gh auth login" },
                            { label: "Check auth status", code: "gh auth status" },
                            { label: "Logout", code: "gh auth logout" },
                            { label: "Refresh credentials", code: "gh auth refresh -h github.com -s delete_repo" }
                        ]
                    },
                    {
                        id: "gh-config",
                        name: "gh config",
                        desc: "Manage configuration for gh.",
                        syntax: "gh config <command> [flags]",
                        examples: [
                            { label: "Set default editor", code: "gh config set editor vim" },
                            { label: "Set default protocol", code: "gh config set git_protocol ssh" },
                            { label: "List configs", code: "gh config list" }
                        ]
                    },
                    {
                        id: "gh-alias",
                        name: "gh alias",
                        desc: "Create command shortcuts for gh.",
                        syntax: "gh alias <command> [flags]",
                        examples: [
                            { label: "Create shortcut", code: "gh alias set co 'pr checkout'" },
                            { label: "List aliases", code: "gh alias list" },
                            { label: "Delete alias", code: "gh alias delete co" }
                        ]
                    }
                ]
            },
            {
                category: "Repositories",
                commands: [
                    {
                        id: "gh-repo",
                        name: "gh repo",
                        desc: "Create, clone, fork, and view repositories.",
                        syntax: "gh repo <command> [flags]",
                        examples: [
                            { label: "Clone a repository", code: "gh repo clone cli/cli" },
                            { label: "Create a new repo", code: "gh repo create my-project --private --source=." },
                            { label: "Fork a repository", code: "gh repo fork --clone" },
                            { label: "View repository", code: "gh repo view cli/cli --web" },
                            { label: "Sync local fork", code: "gh repo sync" }
                        ]
                    }
                ]
            },
            {
                category: "Pull Requests",
                commands: [
                    {
                        id: "gh-pr",
                        name: "gh pr",
                        desc: "Manage pull requests.",
                        syntax: "gh pr <command> [flags]",
                        examples: [
                            { label: "Create a PR", code: "gh pr create --title \"Fix bug\" --body \"Details\"" },
                            { label: "List open PRs", code: "gh pr list --state open" },
                            { label: "Checkout a PR", code: "gh pr checkout 123" },
                            { label: "Merge a PR", code: "gh pr merge 123 --squash --delete-branch" },
                            { label: "Review a PR", code: "gh pr review 123 --approve" },
                            { label: "Check CI status", code: "gh pr checks" }
                        ]
                    }
                ]
            },
            {
                category: "Issues",
                commands: [
                    {
                        id: "gh-issue",
                        name: "gh issue",
                        desc: "Manage and interact with issues.",
                        syntax: "gh issue <command> [flags]",
                        examples: [
                            { label: "List issues", code: "gh issue list --assignee \"@me\"" },
                            { label: "Create an issue", code: "gh issue create --title \"Bug report\" --label \"bug\"" },
                            { label: "View an issue", code: "gh issue view 12" },
                            { label: "Comment on issue", code: "gh issue comment 12 --body \"Looking into this.\"" },
                            { label: "Close an issue", code: "gh issue close 12" }
                        ]
                    }
                ]
            },
            {
                category: "GitHub Actions",
                commands: [
                    {
                        id: "gh-run",
                        name: "gh run",
                        desc: "View, interact with, and re-run workflow runs.",
                        syntax: "gh run <command> [flags]",
                        examples: [
                            { label: "List recent runs", code: "gh run list" },
                            { label: "Watch a run in progress", code: "gh run watch 12345" },
                            { label: "View run details", code: "gh run view 12345 --log" },
                            { label: "Re-run a failed job", code: "gh run rerun 12345 --failed" }
                        ]
                    },
                    {
                        id: "gh-workflow",
                        name: "gh workflow",
                        desc: "View and run GitHub Actions workflows.",
                        syntax: "gh workflow <command> [flags]",
                        examples: [
                            { label: "List workflows", code: "gh workflow list" },
                            { label: "Trigger workflow manually", code: "gh workflow run \"Deploy to Prod\" -f env=production" },
                            { label: "Enable a workflow", code: "gh workflow enable build.yml" }
                        ]
                    }
                ]
            },
            {
                category: "Codespaces",
                commands: [
                    {
                        id: "gh-codespace",
                        name: "gh codespace",
                        desc: "Connect to and manage your Codespaces.",
                        syntax: "gh codespace <command> [flags]",
                        examples: [
                            { label: "Create a Codespace", code: "gh codespace create -r cli/cli" },
                            { label: "List Codespaces", code: "gh codespace list" },
                            { label: "SSH into Codespace", code: "gh codespace ssh" },
                            { label: "Stop a Codespace", code: "gh codespace stop" },
                            { label: "Forward a port", code: "gh codespace ports forward 8080:80" }
                        ]
                    }
                ]
            },
            {
                category: "Releases",
                commands: [
                    {
                        id: "gh-release",
                        name: "gh release",
                        desc: "Manage GitHub releases.",
                        syntax: "gh release <command> [flags]",
                        examples: [
                            { label: "Create a release", code: "gh release create v1.0.0 ./app.zip --notes \"v1 Release\"" },
                            { label: "List releases", code: "gh release list" },
                            { label: "Download assets", code: "gh release download v1.0.0" },
                            { label: "Delete a release", code: "gh release delete v1.0.0" }
                        ]
                    }
                ]
            },
            {
                category: "Gists",
                commands: [
                    {
                        id: "gh-gist",
                        name: "gh gist",
                        desc: "Manage GitHub gists.",
                        syntax: "gh gist <command> [flags]",
                        examples: [
                            { label: "Create a gist", code: "gh gist create script.py --public" },
                            { label: "List your gists", code: "gh gist list" },
                            { label: "View a gist", code: "gh gist view 12345abc" },
                            { label: "Clone a gist", code: "gh gist clone 12345abc" }
                        ]
                    }
                ]
            },
            {
                category: "Search",
                commands: [
                    {
                        id: "gh-search",
                        name: "gh search",
                        desc: "Search for repositories, issues, and code across GitHub.",
                        syntax: "gh search <command> <query> [flags]",
                        examples: [
                            { label: "Search repositories", code: "gh search repos \"react\" --language=javascript" },
                            { label: "Search code", code: "gh search code \"auth_token\" --extension=py" },
                            { label: "Search issues", code: "gh search issues \"memory leak\" --state=open" },
                            { label: "Search PRs", code: "gh search prs \"update dependencies\" --merged" }
                        ]
                    }
                ]
            },
            {
                category: "Security & Secrets",
                commands: [
                    {
                        id: "gh-secret",
                        name: "gh secret",
                        desc: "Manage GitHub Actions secrets.",
                        syntax: "gh secret <command> [flags]",
                        examples: [
                            { label: "List secrets", code: "gh secret list" },
                            { label: "Set a secret", code: "gh secret set API_KEY < key.txt" },
                            { label: "Delete a secret", code: "gh secret delete API_KEY" }
                        ]
                    },
                    {
                        id: "gh-ssh-key",
                        name: "gh ssh-key",
                        desc: "Manage SSH keys registered with your GitHub account.",
                        syntax: "gh ssh-key <command> [flags]",
                        examples: [
                            { label: "List SSH keys", code: "gh ssh-key list" },
                            { label: "Add an SSH key", code: "gh ssh-key add ~/.ssh/id_ed25519.pub --title \"My Laptop\"" },
                            { label: "Delete an SSH key", code: "gh ssh-key delete 12345" }
                        ]
                    }
                ]
            },
            {
                category: "Advanced & Custom",
                commands: [
                    {
                        id: "gh-api",
                        name: "gh api",
                        desc: "Make authenticated raw GitHub API calls.",
                        syntax: "gh api <endpoint> [flags]",
                        examples: [
                            { label: "Get current user", code: "gh api user" },
                            { label: "Post a reaction", code: "gh api -X POST repos/{owner}/{repo}/issues/12/reactions -f content='rocket'" },
                            { label: "GraphQL query", code: "gh api graphql -F owner='cli' -F name='cli' -f query='...'" }
                        ]
                    },
                    {
                        id: "gh-extension",
                        name: "gh extension",
                        desc: "Manage GitHub CLI extensions.",
                        syntax: "gh extension <command> [flags]",
                        examples: [
                            { label: "List extensions", code: "gh extension list" },
                            { label: "Install extension", code: "gh extension install dlvhdr/gh-dash" },
                            { label: "Upgrade extensions", code: "gh extension upgrade --all" }
                        ]
                    }
                ]
            }
        ];

        const navList = document.getElementById('nav-list');
        const contentBody = document.getElementById('content-body');
        const sidebarFilter = document.getElementById('sidebar-filter');
        const globalSearch = document.getElementById('global-search');
        const searchResults = document.getElementById('search-results');

        // --- Render Functions ---
        function renderUI() {
            cliData.forEach(group => {
                // Render Sidebar Groups
                const groupDiv = document.createElement('div');
                groupDiv.className = 'nav-group';
                groupDiv.innerHTML = `<div class="nav-group-title">${group.category}</div>`;

                group.commands.forEach(cmd => {
                    const navItem = document.createElement('a');
                    navItem.className = 'nav-item';
                    navItem.textContent = cmd.name;
                    navItem.onclick = () => scrollToSection(cmd.id);
                    groupDiv.appendChild(navItem);

                    // Render Content Sections
                    renderSection(cmd);
                });
                navList.appendChild(groupDiv);
            });
        }

        function renderSection(cmd) {
            const section = document.createElement('section');
            section.id = cmd.id;

            let examplesHTML = '';
            cmd.examples.forEach(ex => {
                examplesHTML += `
                    <div class="example-block">
                        <div class="example-header">
                            <span>${ex.label}</span>
                            <button class="copy-btn" onclick="copyToClipboard('${ex.code}', this)">Copy</button>
                        </div>
                        <pre><code>${ex.code}</code></pre>
                    </div>
                `;
            });

            section.innerHTML = `
                <h2>${cmd.name}</h2>
                <p class="cmd-desc">${cmd.desc}</p>
                <div class="command-card">
                    <div class="nav-group-title" style="margin-bottom:10px">SYNTAX</div>
                    <div class="syntax">${cmd.syntax}</div>
                    <div class="nav-group-title" style="margin-bottom:10px">EXAMPLES</div>
                    ${examplesHTML}
                </div>
            `;
            contentBody.appendChild(section);
        }

        // --- Navigation & Filter ---
        function scrollToSection(id) {
            const el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth' });
                // Update active state in sidebar
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.classList.toggle('active', item.textContent === id.replace('-', ' '));
                });
            }
        }

        sidebarFilter.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.nav-item').forEach(item => {
                const visible = item.textContent.toLowerCase().includes(term);
                item.style.display = visible ? 'block' : 'none';
            });
            document.querySelectorAll('.nav-group').forEach(group => {
                const hasVisibleItems = Array.from(group.querySelectorAll('.nav-item')).some(i => i.style.display !== 'none');
                group.style.display = hasVisibleItems ? 'block' : 'none';
            });
        };

        // --- Command Palette ---
        globalSearch.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            if (!term) { searchResults.style.display = 'none'; return; }

            const matches = [];
            cliData.forEach(g => g.commands.forEach(c => {
                if (c.name.includes(term) || c.desc.toLowerCase().includes(term)) {
                    matches.push(c);
                }
            }));

            if (matches.length > 0) {
                searchResults.innerHTML = matches.map(m => `
                    <div class="search-result-item" onclick="handleSearchClick('${m.id}')">
                        <strong>${m.name}</strong> - <small>${m.desc.substring(0, 40)}...</small>
                    </div>
                `).join('');
                searchResults.style.display = 'block';
            } else {
                searchResults.style.display = 'none';
            }
        };

        function handleSearchClick(id) {
            scrollToSection(id);
            searchResults.style.display = 'none';
            globalSearch.value = '';
        }

        // --- Utils ---
        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text);
            const original = btn.textContent;
            btn.textContent = 'Copied!';
            btn.style.background = '#2ea44f';
            setTimeout(() => {
                btn.textContent = original;
                btn.style.background = 'transparent';
            }, 2000);
        }

        // Initialize
        renderUI();

        // Close search when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.command-palette')) searchResults.style.display = 'none';
        });
    </script>
</body>

</html>
